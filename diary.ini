[uwsgi]
chdir=/app
module=hiren.wsgi
master=True
processes=4

# TCP socket — works both in Docker and behind nginx on the host
http-socket=0.0.0.0:8000
http-keepalive=True

pidfile=/tmp/diary.pid
vacuum=True
max-requests=1000

# Logging: uWSGI writes to stdout/stderr by default — Docker captures it
disable-logging=False
log-fmt=%(method) %(uri) => %(status) in %(msecs)ms

# Memory / stability
memory-report=true
no-orphans=true

# Threading
enable-threads=true
threads=2
thunder-lock=true

# Misc
pcre-jit=true
close-on-exec=true
buffer-size=16384
die-on-term=true
