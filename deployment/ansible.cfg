[defaults]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=yes -o ServerAliveInterval=60 -o ServerAliveCountMax=3callbacks_enabled = timer, profile_tasks
stdout_callback = default
result_format = yaml
roles_path = roles
retry_files_enabled = False
host_key_checking = True
inventory = inventories/production/hosts
timeout = 30
command_timeout = 300


[privilege_escalation]
become_ask_pass = False
become_user = root
become_method = sudo
