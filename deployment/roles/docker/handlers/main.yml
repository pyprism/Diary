---
- name: restart diary containers
  shell: |
    cd {{ project_root }}
    docker compose up -d --build --force-recreate
  become: yes
  become_user: "{{ deployment_user }}"
  register: docker_restart_result

- name: Note if container restart was skipped
  debug:
    msg: "Container restart skipped (containers may not exist yet on first deployment)"
  when: docker_restart_result is failed

- name: reload systemd
  systemd:
    daemon_reload: yes
  become: yes
